<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مغامرة الدودة السحرية - النسخة المطورة</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; transition: background 1.5s ease;
            background: #000428; color: white; font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; touch-action: none;
        }
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .stats {
            font-size: 24px; font-weight: bold; margin-bottom: 10px;
            text-shadow: 0 0 10px #00f2fe; z-index: 10;
        }
        #game-container {
            position: relative; padding: 8px; background: rgba(255, 255, 255, 0.1);
            border-radius: 18px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(8px);
        }
        canvas#snakeGame { display: block; border-radius: 12px; background: rgba(0, 0, 0, 0.5); }
        .controls {
            display: grid; grid-template-columns: repeat(3, 70px);
            grid-gap: 12px; margin-top: 20px; z-index: 10;
        }
        .btn {
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.85); background: #00f2fe; color: #000; }
        .up { grid-column: 2; } .left { grid-column: 1; } .right { grid-column: 3; } .down { grid-column: 2; }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>
    <div class="stats">✨ النقاط: <span id="score">0</span></div>
    
    <div id="game-container">
        <canvas id="snakeGame" width="300" height="300"></canvas>
    </div>

    <div class="controls">
        <div class="btn up" onclick="changeDirection('UP')">▲</div>
        <div class="btn left" onclick="changeDirection('LEFT')">◀</div>
        <div class="btn right" onclick="changeDirection('RIGHT')">▶</div>
        <div class="btn down" onclick="changeDirection('DOWN')">▼</div>
    </div>

    <script>
        // 1. نظام النجوم الخلفي المتطور
        const starCanvas = document.getElementById("stars");
        const sctx = starCanvas.getContext("2d");
        let stars = [];
        
        function resize() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            stars = Array.from({length: 80}, () => ({
                x: Math.random() * starCanvas.width,
                y: Math.random() * starCanvas.height,
                size: Math.random() * 1.5,
                blink: Math.random() * 0.02
            }));
        }
        window.addEventListener('resize', resize);
        resize();

        function animateStars() {
            sctx.clearRect(0,0, starCanvas.width, starCanvas.height);
            stars.forEach(s => {
                s.blink += 0.01;
                sctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(Math.sin(s.blink))})`;
                sctx.beginPath(); sctx.arc(s.x, s.y, s.size, 0, Math.PI*2); sctx.fill();
            });
            requestAnimationFrame(animateStars);
        }
        animateStars();

        // 2. منطق اللعبة المحسن
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let score = 0;
        let d = "RIGHT";
        let nextD = "RIGHT";
        let gameActive = true;

        let snake = [{x: 8 * box, y: 10 * box}, {x: 7 * box, y: 10 * box}];
        let food = getRandomPos();
        let ball = { x: -100, y: -100, active: false };

        const themes = ["#000428", "#1a1a2e", "#0f3460", "#533483", "#200122", "#072227"];

        function getRandomPos() {
            return {
                x: Math.floor(Math.random() * 15) * box,
                y: Math.floor(Math.random() * 15) * box
            };
        }

        function changeDirection(newDir) {
            if (newDir === "LEFT" && d !== "RIGHT") nextD = "LEFT";
            if (newDir === "UP" && d !== "DOWN") nextD = "UP";
            if (newDir === "RIGHT" && d !== "LEFT") nextD = "RIGHT";
            if (newDir === "DOWN" && d !== "UP") nextD = "DOWN";
        }

        // ظهور الكرة الذهبية كل 5 ثوانٍ
        setInterval(() => {
            if(!gameActive) return;
            ball.active = true;
            let pos = getRandomPos();
            ball.x = pos.x; ball.y = pos.y;
            setTimeout(() => ball.active = false, 3000); // تختفي بعد 3 ثوانٍ
        }, 6000);

        function main() {
            if(!gameActive) return;
            
            d = nextD;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.body.style.backgroundColor = themes[Math.floor(score / 5) % themes.length];

            // رسم الدودة
            snake.forEach((part, i) => {
                ctx.fillStyle = (i === 0) ? "#00f2fe" : `rgba(0, 242, 254, ${0.8 - (i/snake.length)*0.5})`;
                ctx.shadowBlur = (i === 0) ? 15 : 0;
                ctx.shadowColor = "#00f2fe";
                ctx.beginPath();
                ctx.roundRect(part.x, part.y, box-2, box-2, 6);
                ctx.fill();
            });

            // رسم الطعام
            ctx.fillStyle = "#ff0055";
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff0055";
            ctx.fillRect(food.x+4, food.y+4, box-8, box-8);

            // رسم الكرة الذهبية
            if(ball.active) {
                ctx.fillStyle = "#ffd700";
                ctx.shadowBlur = 20; ctx.shadowColor = "#ffd700";
                ctx.beginPath(); ctx.arc(ball.x+box/2, ball.y+box/2, box/3, 0, Math.PI*2); ctx.fill();
            }
            ctx.shadowBlur = 0;

            let headX = snake[0].x;
            let headY = snake[0].y;

            if(d === "LEFT") headX -= box;
            if(d === "UP") headY -= box;
            if(d === "RIGHT") headX += box;
            if(d === "DOWN") headY += box;

            // كشف الاصطدام بالجدران أو النفس
            if(headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || 
               snake.some((p, i) => i !==0 && p.x === headX && p.y === headY)) {
                gameActive = false;
                alert("انتهت المغامرة! نقاطك: " + score);
                location.reload();
                return;
            }

            let newHead = {x: headX, y: headY};

            // أكل الطعام أو الكرة
            if(headX === food.x && headY === food.y) {
                score++;
                document.getElementById("score").innerText = score;
                food = getRandomPos();
            } else if(ball.active && headX === ball.x && headY === ball.y) {
                score += 5;
                document.getElementById("score").innerText = score;
                ball.active = false;
            } else {
                snake.pop();
            }

            snake.unshift(newHead);
            setTimeout(main, 110);
        }

        main();
    </script>
</body>
</html>
