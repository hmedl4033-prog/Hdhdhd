<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Pro Game</title>
    <style>
        body { background: #000; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #container { display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: flex-start; }
        
        /* إعدادات الشاشة العلوية - مستطيلة ومضبوطة للهاتف */
        .screen { position: relative; width: 100%; display: flex; justify-content: center; background: #111; padding: 10px 0; border-bottom: 2px solid #0f0; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        canvas { border: 2px solid #0f0; background: #000; border-radius: 8px; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
        
        .score { position: absolute; top: 15px; right: 20px; color: #0f0; font-weight: bold; text-shadow: 0 0 5px #0f0; font-size: 18px; }

        /* منطقة الأزرار - مساحة واسعة ومريحة */
        .controls { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; background: #050505; }
        .grid { display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; justify-content: center; }
        
        button { 
            height: 65px; width: 65px; font-size: 25px; border-radius: 50%; 
            background: linear-gradient(#222, #111); color: #0f0; 
            border: 2px solid #0f0; box-shadow: 0 0 10px rgba(0,255,0,0.3);
            outline: none; active { transform: scale(0.9); background: #0f0; color: #000; }
        }
    </style>
</head>
<body>

<div id="container">
    <div class="screen">
        <canvas id="g" width="280" height="120"></canvas>
        <div class="score">SCORE: <span id="s">0</span></div>
    </div>

    <div class="controls">
        <div class="grid">
            <div></div>
            <button onclick="changeDir('U')">⬆️</button>
            <div></div>
            
            <button onclick="changeDir('L')">⬅️</button>
            <button onclick="changeDir('D')">⬇️</button>
            <button onclick="changeDir('R')">➡️</button>
        </div>
    </div>
</div>

<script>
const cvs = document.getElementById("g"), ctx = cvs.getContext("2d");
const W = 280, H = 120, b = 10; 
let sc = 0, d = "STOP", sn = [{x:140,y:60},{x:130,y:60},{x:120,y:60}], over = false;

function newF() {
    return { x: Math.floor(Math.random()*(W/b))*b, y: Math.floor(Math.random()*(H/b))*b };
}
let foods = [newF(), newF(), newF(), newF(), newF(), newF()];

function changeDir(newD) {
    if(newD=='U' && d!='D') d='U';
    if(newD=='D' && d!='U') d='D';
    if(newD=='L' && d!='R') d='L';
    if(newD=='R' && d!='L') d='R';
}

function draw() {
    if(over) return;

    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0,0,W,H);
    
    // رسم الطعام - كرز نيون واقعي
    foods.forEach(f => {
        ctx.shadowBlur = 10; ctx.shadowColor = "#f00";
        let g = ctx.createRadialGradient(f.x+5, f.y+5, 1, f.x+5, f.y+5, 5);
        g.addColorStop(0, "#ff4d4d"); g.addColorStop(1, "#800000");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(f.x+5, f.y+5, 4.5, 0, Math.PI*2); ctx.fill();
    });
    
    // رسم الدودة - نيون ثلاثي الأبعاد
    sn.forEach((p,i) => {
        ctx.shadowBlur = (i==0) ? 15 : 8; ctx.shadowColor = "#0f0";
        let g = ctx.createRadialGradient(p.x+5, p.y+5, 2, p.x+5, p.y+5, 5);
        if(i==0) { 
            g.addColorStop(0, "#0f0"); g.addColorStop(1, "#040");
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(p.x+5, p.y+5, 5.5, 0, Math.PI*2); ctx.fill();
            // عيون
            ctx.shadowBlur = 0; ctx.fillStyle="white";
            ctx.fillRect(p.x+2, p.y+3, 2, 2); ctx.fillRect(p.x+6, p.y+3, 2, 2);
        } else {
            g.addColorStop(0, "#0a0"); g.addColorStop(1, "#020");
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(p.x+5, p.y+5, 4.5, 0, Math.PI*2); ctx.fill();
        }
    });

    if(d == "STOP") return;
    
    let hX = sn[0].x, hY = sn[0].y;
    if(d == "U") hY -= b; if(d == "D") hY += b; if(d == "L") hX -= b; if(d == "R") hX += b;
    
    if(hX >= W) hX = 0; else if(hX < 0) hX = W - b;
    if(hY >= H) hY = 0; else if(hY < 0) hY = H - b;
    
    if(sn.some(p => p.x == hX && p.y == hY)) {
        over = true;
        setTimeout(() => { alert("انتهت اللعبة! نقاطك: " + sc); location.reload(); }, 50);
        return;
    }
    
    let nH = {x:hX, y:hY};
    sn.unshift(nH);
    let ate = false;
    foods.forEach((f, index) => {
        if(hX === f.x && hY === f.y) {
            sc++; document.getElementById("s").innerText = sc;
            foods[index] = newF(); ate = true;
        }
    });
    if(!ate) sn.pop();
}

setInterval(draw, 110); // سرعة عالية وممتعة
</script>
</body>
</html>
